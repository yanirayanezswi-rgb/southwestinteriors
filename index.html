<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Southwest Interiors LLC</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #111;
      color: #f2f4ff;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 32px 20px 40px;
    }

    h1 {
      font-size: 42px;
      line-height: 1.1;
      margin: 24px 0 20px;
      color: #e8eeff;
    }

    .button {
      display: block;
      width: 100%;
      max-width: 320px;
      margin: 12px auto;
      padding: 16px;
      background: #001a5c;
      color: white;
      text-decoration: none;
      border: none;
      border-radius: 14px;
      font-size: 18px;
      cursor: pointer;
      box-sizing: border-box;
    }
